<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hit & Blow</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 26px;
    }

    .desc {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
      line-height: 1.5;
    }

    input {
      width: 90%;
      padding: 15px;
      font-size: 22px;
      border-radius: 12px;
      border: 1px solid #ccc;
      text-align: center;
      margin-bottom: 15px;
    }

    button {
      width: 90%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #667eea;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 20px;
    }

    #history {
      margin-top: 15px;
      text-align: left;
      max-height: 150px;
      overflow-y: auto;
      font-size: 14px;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }

    .history-item {
      margin-bottom: 5px;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); }
    }

    .clear {
      animation: pop 0.5s ease;
      color: #ff4d6d;
    }

    .confetti {
      position: fixed;
      top: -10px;
      width: 8px;
      height: 8px;
      animation: fall 2s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
      }
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Hit & Blow</h1>

  <p class="desc">
    3桁の数字を当てよう！（重複なし）<br>
    Hit：数字も場所も正しい<br>
    Blow：数字は合ってるけど場所が違う
  </p>

  <input id="guess" maxlength="3" placeholder="例: 123">
  <button onclick="check()">決定</button>

  <p id="result"></p>
  <div id="history"></div>
</div>

<script>
let numbers = "0123456789".split("");
numbers.sort(() => Math.random() - 0.5);
let answer = numbers.slice(0,3);
let attempts = 0;

// 🔥 Enterキー対応
document.getElementById("guess").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    check();
  }
});

function check() {
  let guessInput = document.getElementById("guess");
  let guess = guessInput.value;

  if (guess.length !== 3 || isNaN(guess)) {
    document.getElementById("result").textContent = "3桁の数字で入力して！";
    return;
  }

  let guessArr = guess.split("");
  let hit = 0;
  let blow = 0;

  for (let i = 0; i < 3; i++) {
    if (guessArr[i] === answer[i]) {
      hit++;
    } else if (answer.includes(guessArr[i])) {
      blow++;
    }
  }

  attempts++;

  let result = document.getElementById("result");

  // 履歴追加
  let history = document.getElementById("history");
  let item = document.createElement("div");
  item.className = "history-item";
  item.textContent = attempts + "回目： " + guess + " → " + hit + " Hit / " + blow + " Blow";
  history.prepend(item);

  if (hit === 3) {
    result.textContent = "正解！🎉 " + attempts + "回でクリア！";
    result.classList.add("clear");
    launchConfetti();
  } else {
    result.textContent =
      hit + " Hit / " + blow + " Blow（" + attempts + "回）";
  }

  // 入力を空にする（便利）
  guessInput.value = "";
}

function launchConfetti() {
  for (let i = 0; i < 30; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = "hsl(" + Math.random() * 360 + ",100%,50%)";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2000);
  }
}
</script>

</body>
</html>
