<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hit & Blow</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .desc {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
      line-height: 1.5;
    }

    input {
      width: 90%;
      padding: 15px;
      font-size: 22px;
      border-radius: 12px;
      border: 1px solid #ccc;
      text-align: center;
      margin-bottom: 15px;
    }

    button {
      width: 90%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #667eea;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
      font-size: 20px;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Hit & Blow</h1>

  <p class="desc">
    3桁の数字を当てよう！（重複なし）<br>
    Hit：数字も場所も正しい<br>
    Blow：数字は合ってるけど場所が違う
  </p>

  <input id="guess" maxlength="3" placeholder="例: 123">

  <button onclick="check()">決定</button>

  <p id="result"></p>
</div>

<script>
let numbers = "0123456789".split("");
numbers.sort(() => Math.random() - 0.5);
let answer = numbers.slice(0,3);
let attempts = 0;

function check() {
  let guess = document.getElementById("guess").value;

  if (guess.length !== 3 || isNaN(guess)) {
    document.getElementById("result").textContent = "3桁の数字で入力して！";
    return;
  }

  let guessArr = guess.split("");
  let hit = 0;
  let blow = 0;

  for (let i = 0; i < 3; i++) {
    if (guessArr[i] === answer[i]) {
      hit++;
    } else if (answer.includes(guessArr[i])) {
      blow++;
    }
  }

  attempts++;

  if (hit === 3) {
    document.getElementById("result").textContent =
      "正解！🎉 " + attempts + "回でクリア！";
  } else {
    document.getElementById("result").textContent =
      hit + " Hit / " + blow + " Blow（" + attempts + "回）";
  }
}
</script>

</body>
</html>
